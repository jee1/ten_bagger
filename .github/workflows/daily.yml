name: Daily Ten Bagger

on:
  schedule:
    # 21:00 UTC = 06:00 KST
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), default today KST'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-ten-bagger
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate existing content
        run: cd scripts && python sync_manifest.py && python validate_content.py

      - name: Run Python tests
        run: cd scripts && python -m pytest tests/ -q

      - name: Cache yfinance responses
        uses: actions/cache@v4
        with:
          path: scripts/cache
          key: yf-cache-${{ runner.os }}-${{ hashFiles('scripts/universe/*.json') }}
          restore-keys: |
            yf-cache-${{ runner.os }}-

      - name: Update universe listings
        run: cd scripts && python build_universe.py

      - name: Generate daily report
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(TZ=Asia/Seoul date +%F)
          fi
          cd scripts && python generate_daily.py "$TARGET"

      - name: Validate daily JSON
        run: |
          cd scripts && python sync_manifest.py
          python validate_content.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run check
          npm run build

      - name: Commit daily content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add content/ scripts/universe/
          if git diff --staged --quiet; then
            echo "No content changes"
          else
            git commit -m "chore: daily report $(TZ=Asia/Seoul date +%F)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: generate-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    needs: [generate-and-deploy, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Daily Ten Bagger failed — $(TZ=Asia/Seoul date +%F)"
          BODY=$(cat <<EOF
          Daily workflow failed. See [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Recovery**
          1. Open the run log above
          2. Re-run via \`workflow_dispatch\` with optional date (\`YYYY-MM-DD\`)
          3. Local: \`build_universe.py\` → \`generate_daily.py\` → \`validate_content.py\`
          EOF
          )
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --search "$TITLE in:title" --state open --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Failed again: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label "ci-failure" || \
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY"
          fi
          echo "::error title=Daily Ten Bagger failed::Issue opened/updated. Re-run via workflow_dispatch."
